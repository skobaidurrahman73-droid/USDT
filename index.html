<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BDT Wallet</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">

    <div id="app" class="max-w-md mx-auto">
        <!-- Auth Section -->
        <div id="authSection">
            <h2 class="text-2xl font-bold mb-4">Login / Register</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-2 mb-2 bg-gray-800 rounded">
            <input type="password" id="password" placeholder="6-Digit PIN" maxlength="6" class="w-full p-2 mb-4 bg-gray-800 rounded">
            <button onclick="login()" class="w-full bg-blue-600 p-2 mb-2 rounded">Login</button>
            <button onclick="register()" class="w-full bg-green-600 p-2 rounded">Register</button>
        </div>

        <!-- Wallet Section -->
        <div id="walletSection" class="hidden">
            <h2 class="text-xl font-bold">UID: <span id="uidDisplay"></span></h2>
            <h1 class="text-4xl my-4 text-center" id="balanceDisplay">0.00 BDT</h1>
            <button onclick="auth.signOut()" class="w-full bg-red-600 p-2 rounded">Logout</button>
        </div>
    </div>

    <script>
        // --- আপনার কনফিগারেশন এখানে বসান ---
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "...",
            projectId: "...",
            databaseURL: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // রেজিস্টার ফাংশন
        function register() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(p.length !== 6) return alert("PIN must be 6 digits");
            
            auth.createUserWithEmailAndPassword(e, p).then(userCred => {
                db.ref('users/' + userCred.user.uid).set({
                    uid: "BDT" + Math.floor(100000 + Math.random()*900000),
                    bal: 100,
                    pin: p
                }).then(() => alert("Registration Successful!"));
            }).catch(err => alert("Reg Error: " + err.message));
        }

        // লগইন ফাংশন
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Login Error: " + err.message));
        }

        // অথ স্টেট চেক
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('walletSection').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => {
                    const d = s.val();
                    document.getElementById('uidDisplay').innerText = d.uid;
                    document.getElementById('balanceDisplay').innerText = d.bal + " BDT";
                });
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('walletSection').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
