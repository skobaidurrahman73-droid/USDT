<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure BDT Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <!-- Auth Section -->
    <div id="authSection" class="max-w-md mx-auto h-screen flex flex-col justify-center px-6">
        <div class="glass p-8 text-center border-t border-emerald-500/30">
            <h1 class="text-2xl font-black mb-6 text-emerald-400">SECURE BDT WALLET</h1>
            <input type="email" id="email" placeholder="Email Address" class="w-full p-3 rounded-xl mb-3 bg-slate-900 border border-slate-700 outline-none">
            <input type="password" id="password" placeholder="Create/Enter 4-Digit PIN" maxlength="4" class="w-full p-3 rounded-xl mb-6 bg-slate-900 border border-slate-700 outline-none tracking-widest text-center text-xl">
            <div class="flex gap-3">
                <button onclick="handleAuth('login')" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 border border-emerald-600 py-3 rounded-xl font-bold">Sign Up</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="max-w-md mx-auto pb-10 px-5 hidden">
        <div class="flex justify-between items-center py-6">
            <h2 class="text-sm font-bold">UID: <span id="uId" class="text-emerald-400">---</span></h2>
            <button onclick="auth.signOut()" class="text-xs text-red-400 font-bold">LOGOUT</button>
        </div>

        <div class="glass p-6 text-center mb-6">
            <p class="text-slate-400 text-[10px] uppercase">Available Balance</p>
            <h1 id="mainBal" class="text-4xl font-black my-2">0.00 <span class="text-sm text-emerald-500">BDT</span></h1>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="openModal('sendMoneyModal')" class="bg-emerald-600 p-4 rounded-2xl font-bold text-sm">Send Money</button>
            <button onclick="openHistory()" class="bg-slate-800 p-4 rounded-2xl font-bold text-sm">History</button>
        </div>

        <div class="glass p-5 text-center">
            <p class="text-[10px] text-slate-400 uppercase mb-1">Support</p>
            <a href="mailto:fafod33233@tokoub.com" class="text-emerald-400 text-sm font-mono underline">fafod33233@tokoub.com</a>
        </div>
    </div>

    <!-- Send Money Modal -->
    <div id="sendMoneyModal" class="modal">
        <div class="glass p-6 w-full max-w-sm border-t-4 border-emerald-500">
            <h2 class="text-lg font-bold mb-4 text-center">Send Money</h2>
            <input type="text" id="rUid" placeholder="Recipient UID" class="w-full p-3 rounded-lg mb-3 bg-slate-900 border border-slate-700 text-sm uppercase">
            <input type="number" id="amt" placeholder="Amount BDT" class="w-full p-3 rounded-lg mb-3 bg-slate-900 border border-slate-700 text-sm">
            <input type="password" id="pin" placeholder="Enter 4-Digit PIN" maxlength="4" class="w-full p-3 rounded-lg mb-6 bg-slate-900 border border-slate-700 text-sm text-center tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeModal('sendMoneyModal')" class="flex-1 bg-slate-800 py-3 rounded-lg text-xs">Cancel</button>
                <button onclick="transferMoney()" class="flex-1 bg-emerald-600 py-3 rounded-lg text-xs">Confirm Send</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal">
        <div class="glass p-6 w-full max-w-sm h-[80vh] flex flex-col">
            <h2 class="text-lg font-bold mb-4 text-center">Transaction History</h2>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-2"></div>
            <button onclick="closeModal('historyModal')" class="mt-4 bg-slate-800 py-3 rounded-lg text-xs">Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBIM8Rp8REYjdPHZegCYBF5ikW6Xdcqeg4",
            authDomain: "usdt-72320.firebaseapp.com",
            projectId: "usdt-72320",
            databaseURL: "https://usdt-72320-default-rtdb.firebaseio.com",
            storageBucket: "usdt-72320.firebasestorage.app",
            messagingSenderId: "7688156181",
            appId: "1:7688156181:web:85ae9e18021d149627ca1c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        let userData = null;

        // Auth
        function handleAuth(type) {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('password').value.trim();
            if(p.length !== 4) return alert("PIN must be 4 digits!");
            
            if(type === 'signup') {
                auth.createUserWithEmailAndPassword(e, p).then(c => {
                    const uid = "BDT" + Math.floor(10000 + Math.random() * 90000);
                    database.ref('users/' + c.user.uid).set({ uid: uid, email: e, bal: 100, pin: p }); // 100 BDT bonus
                }).catch(err => alert(err.message));
            } else { auth.signInWithEmailAndPassword(e, p).catch(() => alert("Login Failed")); }
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                database.ref('users/' + u.uid).on('value', s => { userData = s.val(); if(userData) updateUI(); });
            } else { location.reload(); }
        });

        function updateUI() {
            document.getElementById('mainBal').innerHTML = userData.bal.toFixed(2) + ' <span class="text-sm text-emerald-500">BDT</span>';
            document.getElementById('uId').innerText = userData.uid;
        }

        // Send Money
        function transferMoney() {
            const rUid = document.getElementById('rUid').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('amt').value);
            const pin = document.getElementById('pin').value.trim();

            if(pin !== userData.pin) return alert("Wrong PIN!");
            if(amt > userData.bal) return alert("Insufficient Balance!");

            database.ref('users').once('value', snapshot => {
                let recipientKey = null;
                snapshot.forEach(child => { if(child.val().uid === rUid) recipientKey = child.key; });

                if(recipientKey) {
                    const now = new Date().toLocaleTimeString();
                    database.ref('users/' + auth.currentUser.uid).update({ bal: userData.bal - amt });
                    database.ref('users/' + recipientKey).update({ bal: database.ref('users/' + recipientKey).bal + amt }); // Logic update required
                    database.ref('history/' + auth.currentUser.uid).push({ type: "Send", to: rUid, amt: amt, time: now });
                    alert("Transfer Successful!");
                    closeModal('sendMoneyModal');
                } else { alert("UID Not Found!"); }
            });
        }

        function openHistory() {
            openModal('historyModal');
            const list = document.getElementById('historyList');
            database.ref('history/' + auth.currentUser.uid).once('value', s => {
                list.innerHTML = "";
                s.forEach(c => {
                    list.innerHTML += `<div class="bg-slate-800 p-3 rounded-lg text-xs flex justify-between"><span>Sent to ${c.val().to}</span><span class="text-emerald-400 font-bold">${c.val().amt} BDT</span></div>`;
                });
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
