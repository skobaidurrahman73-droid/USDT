<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDT Secure Wallet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .gradient-cyan { background: linear-gradient(135deg, #22d3ee, #0ea5e9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        input { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="authSection" class="max-w-md mx-auto h-screen flex flex-col justify-center px-6">
        <div class="glass p-8 text-center border-t border-cyan-500/20 shadow-2xl">
            <h1 class="text-3xl font-black mb-8 text-cyan-400 tracking-tighter uppercase italic">BDT Node</h1>
            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-2xl mb-4 text-sm">
            <input type="password" id="password" placeholder="6-Digit PIN/Password" maxlength="6" class="w-full p-4 rounded-2xl mb-8 text-sm text-center tracking-widest">
            <div class="flex gap-4">
                <button onclick="handleAuth('login')" class="flex-1 gradient-cyan text-black font-black py-4 rounded-2xl uppercase text-[11px]">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 border border-white/10 py-4 rounded-2xl font-bold uppercase text-[11px]">Join Now</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="max-w-md mx-auto pb-32 px-5 hidden">
        <div class="flex justify-between items-center py-8">
            <h2 class="text-white font-bold text-xs">UID: <span id="uId" class="text-cyan-400">---</span></h2>
            <button onclick="auth.signOut()" class="text-red-500 text-[10px] font-black border border-red-500/20 px-4 py-2 rounded-xl">Logout</button>
        </div>

        <div class="glass p-8 text-center mb-8 relative border-t border-white/10">
            <p class="text-gray-500 text-[10px] font-black uppercase mb-2">Total Balance</p>
            <div class="flex items-center justify-center gap-2 mb-8">
                <i class="fas fa-wallet text-cyan-400 text-2xl"></i>
                <h1 id="mainBal" class="text-5xl font-black tracking-tighter">0.00</h1>
                <span class="text-xl text-white/40">BDT</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="openModal('sendMoneyModal')" class="bg-cyan-500/10 border border-cyan-500/20 py-4 rounded-2xl font-black text-sm text-cyan-400">Send Money</button>
                <button onclick="openHistory()" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-sm text-gray-300">History</button>
            </div>
        </div>

        <div class="mt-12 p-6 glass text-center">
            <p class="text-cyan-400 text-[10px] font-black uppercase mb-2">Emergency Support</p>
            <a href="mailto:fafod33233@tokoub.com" class="text-white text-xs font-mono underline block mb-3">fafod33233@tokoub.com</a>
            <p class="text-[8px] text-gray-500 uppercase leading-relaxed font-bold">Please include your UID and Email when contacting support.</p>
        </div>
    </div>

    <div id="sendMoneyModal" class="modal">
        <div class="glass p-8 w-full max-w-sm border-t-4 border-cyan-500">
            <h2 class="text-xl font-black mb-6 text-center text-cyan-400 uppercase italic">Send Money</h2>
            <input type="text" id="smFriendUid" placeholder="Recipient UID" class="w-full p-4 rounded-xl mb-3 text-xs uppercase">
            <input type="number" id="smAmount" placeholder="Amount BDT" class="w-full p-4 rounded-xl mb-3 text-xs">
            <input type="password" id="smPass" placeholder="6-Digit PIN" maxlength="6" class="w-full p-4 rounded-xl mb-6 text-xs text-center tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeModal('sendMoneyModal')" class="flex-1 bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase">Cancel</button>
                <button onclick="submitTransfer()" class="flex-1 gradient-cyan text-black font-black py-4 rounded-xl text-[10px] uppercase">Send Now</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="glass p-8 w-full max-w-sm">
            <h2 class="text-lg font-black mb-6 text-center text-cyan-400 uppercase">Statement</h2>
            <div id="historyList" class="space-y-3 max-h-[50vh] overflow-y-auto no-scrollbar"></div>
            <button onclick="closeModal('historyModal')" class="w-full mt-6 text-gray-600 font-black uppercase text-[10px]">Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBIM8Rp8REYjdPHZegCYBF5ikW6Xdcqeg4",
            authDomain: "usdt-72320.firebaseapp.com",
            databaseURL: "https://usdt-72320-default-rtdb.firebaseio.com",
            projectId: "usdt-72320",
            storageBucket: "usdt-72320.firebasestorage.app",
            messagingSenderId: "7688156181",
            appId: "1:7688156181:web:85ae9e18021d149627ca1c",
            measurementId: "G-VRS9ZTF6ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        let userData = null;

        // Strict Authentication Validation Fix
        function handleAuth(type) {
            const e = document.getElementById('email').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            
            if(!e || !p) return alert("Please fill all fields!");
            if(p.length !== 6) return alert("PIN must be exactly 6 digits!");

            if(type === 'signup') {
                auth.createUserWithEmailAndPassword(e, p).then(c => {
                    const randomId = "BDT" + Math.floor(100000 + Math.random() * 900000);
                    database.ref('users/' + c.user.uid).set({ 
                        uid: randomId, 
                        email: e, 
                        bal: 500, 
                        pass: p 
                    }).then(() => {
                        alert("Account Created Successfully!");
                    });
                }).catch(err => alert("Registration Error: " + err.message));
            } else { 
                // Strict Login Validation
                auth.signInWithEmailAndPassword(e, p).then((userCredential) => {
                    // Double check if the logged in user email matches the input email strictly
                    if(userCredential.user.email.toLowerCase() !== e) {
                        auth.signOut();
                        alert("Login Error: Email mismatch.");
                    }
                }).catch(err => alert("Login Error: " + err.message)); 
            }
        }

        // Secure Auth State Listener
        auth.onAuthStateChanged(user => {
            if(user) {
                database.ref('users/' + user.uid).once('value', s => { 
                    userData = s.val(); 
                    // Verify if database profile email matches current user email
                    if(userData && userData.email.toLowerCase() === user.email.toLowerCase()) {
                        document.getElementById('authSection').classList.add('hidden');
                        document.getElementById('mainApp').classList.remove('hidden');
                        
                        // Start real-time sync only after deep validation
                        database.ref('users/' + user.uid).on('value', snapshot => {
                            userData = snapshot.val();
                            if(userData) updateUI();
                        });
                    } else {
                        auth.signOut();
                    }
                });
            } else { 
                document.getElementById('authSection').classList.remove('hidden'); 
                document.getElementById('mainApp').classList.add('hidden'); 
            }
        });

        function updateUI() {
            if(!userData) return;
            document.getElementById('mainBal').innerText = userData.bal.toFixed(2);
            document.getElementById('uId').innerText = userData.uid;
        }

        // Send Money Logic
        function submitTransfer() {
            const tUid = document.getElementById('smFriendUid').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('smAmount').value);
            const pass = document.getElementById('smPass').value.trim();

            if(!tUid || isNaN(amt) || amt <= 0) return alert("Invalid Amount or UID!");
            if(pass !== userData.pass) return alert("Wrong 6-Digit PIN!");
            if(tUid === userData.uid) return alert("You cannot send money to yourself!");
            if(userData.bal < amt) return alert("Insufficient Balance!");

            database.ref('users').once('value', snapshot => {
                let recipientKey = null;
                let recipientData = null;

                snapshot.forEach(child => {
                    if(child.val().uid === tUid) {
                        recipientKey = child.key;
                        recipientData = child.val();
                    }
                });

                if(recipientKey) {
                    const now = new Date().toLocaleString();
                    
                    database.ref('users/' + auth.currentUser.uid).update({ bal: userData.bal - amt });
                    database.ref('users/' + recipientKey).update({ bal: recipientData.bal + amt });

                    database.ref('history/' + auth.currentUser.uid).push({ type: "Send Money", amount: "-" + amt.toFixed(2), status: "Complete", time: now });
                    database.ref('history/' + recipientKey).push({ type: "Received Money", amount: "+" + amt.toFixed(2), status: "Complete", time: now });

                    alert("Successfully Transferred " + amt + " BDT");
                    closeModal('sendMoneyModal');
                    document.getElementById('smFriendUid').value = '';
                    document.getElementById('smAmount').value = '';
                    document.getElementById('smPass').value = '';
                } else {
                    alert("Recipient UID Not Found!");
                }
            });
        }

        // Open Statement History
        function openHistory() {
            const list = document.getElementById('historyList'); 
            list.innerHTML = "Syncing..."; 
            openModal('historyModal');
            
            database.ref('history/' + auth.currentUser.uid).on('value', s => {
                list.innerHTML = "";
                if(!s.exists()) { list.innerHTML = "<p class='text-center text-xs text-gray-500'>No transactions found</p>"; return; }
                let logs = []; 
                s.forEach(c => { logs.push(c.val()); }); 
                logs.reverse();
                
                logs.forEach(h => {
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <div class="flex justify-between">
                            <span class="text-white font-black text-[10px] uppercase">${h.type}</span>
                            <span class="text-white font-black text-xs">${h.amount} BDT</span>
                        </div>
                        <div class="flex justify-between mt-1">
                            <span class="text-[7px] text-gray-400 uppercase">${h.time}</span>
                            <span class="text-cyan-400 text-[8px] uppercase font-bold">${h.status}</span>
                        </div>
                    </div>`;
                });
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
